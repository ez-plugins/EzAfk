name: CI

on:
  pull_request:
    branches: [ v2.x, v3.x ]

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and install MockBukkit dev/26.1.1
        run: |
          git clone --depth=1 --branch dev/26.1.1 https://github.com/MockBukkit/MockBukkit.git /tmp/MockBukkit
          cd /tmp/MockBukkit && ./gradlew publishToMavenLocal -xtest -xjavadoc

      - name: Run unit tests
        run: mvn -B -ntp test

  feature-tests:
    name: Feature tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and install MockBukkit dev/26.1.1
        run: |
          git clone --depth=1 --branch dev/26.1.1 https://github.com/MockBukkit/MockBukkit.git /tmp/MockBukkit
          cd /tmp/MockBukkit && ./gradlew publishToMavenLocal -xtest -xjavadoc

      - name: Run feature tests
        run: mvn -B -ntp -Pfeature-tests -Dtest=*FeatureTest test
